<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DRIP - Hors ligne</title>
    <meta name="theme-color" content="#FF3B5C" />
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #050508;
        color: #fff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(100% - 40px, 420px);
        text-align: center;
      }
      .mark {
        width: 72px;
        height: 72px;
        margin: 0 auto 22px;
        border-radius: 20px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #FF3B5C, #c0135e);
        box-shadow: 0 0 40px rgba(255, 59, 92, .34);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }
      p {
        margin: 0;
        color: rgba(255,255,255,.58);
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M13 2 5 14h6l-1 8 9-13h-6l0-7Z" fill="white"/>
        </svg>
      </div>
      <h1>Tu es hors ligne</h1>
      <p>DRIP garde l'app ouverte. Reviens avec une connexion pour charger de nouveaux looks.</p>
    </main>
  </body>
</html>
